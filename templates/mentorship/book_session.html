{% extends 'base.html' %}
{% block title %}Book Session — GrowthHive{% endblock %}

{% block content %}
<div style="max-width:600px;">
  <div class="gh-page-header"><h1>Book a Session</h1>
  <p class="text-muted">With {{ req.mentor.get_full_name }}</p></div>
  <div class="gh-card">
    <form method="post" novalidate>{% csrf_token %}
      {% for field in form %}
      <div class="mb-3"><label class="gh-label">{{ field.label }}</label>{{ field }}
      {% if field.errors %}<div class="gh-field-error">{{ field.errors.0 }}</div>{% endif %}</div>
      {% endfor %}
      <button type="submit" class="btn gh-btn-primary">Book Session</button>
      <a href="{% url 'mentorship:my' %}" class="btn gh-btn-outline ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
